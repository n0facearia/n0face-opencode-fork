name: release-cli

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Release v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --repo "${{ github.repository }}" || true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: darwin-arm64
          # darwin-x64 (macos-13) removed — runner unavailable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies (ignore native scripts)
        run: bun install --ignore-scripts

      - name: Fix node-pty
        run: bun run --cwd packages/opencode fix-node-pty

      - name: Build CLI binary
        run: bun run --cwd packages/opencode build --single
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package binary
        run: |
          DIST="packages/opencode/dist"
          BINARY=$(find "$DIST" -name "am" -type f | head -1)
          if [ -n "$BINARY" ]; then
            DIRNAME=$(dirname "$(dirname "$BINARY")")
            BASENAME=$(basename "$DIRNAME")
            cd "$(dirname "$BINARY")"
            tar -czf "${BASENAME}.tar.gz" am
            echo "asset_path=$(pwd)/${BASENAME}.tar.gz" >> "$GITHUB_ENV"
            echo "asset_name=${BASENAME}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload binary to release
        if: env.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.create-release.outputs.version }}" \
            "${{ env.asset_path }}" \
            --clobber \
            --repo "${{ github.repository }}"
